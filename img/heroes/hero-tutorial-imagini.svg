<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <radialGradient id="burst" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff00e5" stop-opacity="0.15"/>
    <stop offset="70%" stop-color="#00d4ff" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .pulse{animation:pulse 2.5s ease-in-out infinite}
  .float{animation:float 3.5s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- Creative burst background -->
<circle cx="600" cy="200" r="200" fill="url(#burst)"/>
<!-- Paintbrush -->
<g transform="translate(350,120) rotate(30)" filter="url(#glow)" opacity="0.6" class="float">
  <rect x="0" y="0" width="14" height="80" rx="3" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
  <rect x="-2" y="80" width="18" height="40" rx="2" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
  <rect x="1" y="85" width="12" height="8" fill="#00d4ff" opacity="0.3"/>
  <!-- Brush tip paint -->
  <path d="M-2 120 Q7 135 18 120" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
</g>
<!-- Color palette dots -->
<g filter="url(#glow)" class="pulse">
  <circle cx="200" cy="280" r="15" stroke="#00d4ff" stroke-width="2" fill="#00d4ff" fill-opacity="0.15"/>
  <circle cx="245" cy="295" r="12" stroke="#ff00e5" stroke-width="2" fill="#ff00e5" fill-opacity="0.15"/>
  <circle cx="215" cy="320" r="10" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="260" cy="330" r="8" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="180" cy="310" r="9" stroke="url(#g1)" stroke-width="1.5" fill="none" opacity="0.4"/>
</g>
<!-- Pixels forming image (right side) -->
<g opacity="0.5" filter="url(#glow)">
  <!-- Complete pixels -->
  <rect x="780" y="120" width="20" height="20" rx="2" fill="#ff00e5" opacity="0.6"/>
  <rect x="805" y="120" width="20" height="20" rx="2" fill="#00d4ff" opacity="0.5"/>
  <rect x="830" y="120" width="20" height="20" rx="2" fill="#ff00e5" opacity="0.4"/>
  <rect x="780" y="145" width="20" height="20" rx="2" fill="#00d4ff" opacity="0.55"/>
  <rect x="805" y="145" width="20" height="20" rx="2" fill="#ff00e5" opacity="0.65"/>
  <rect x="830" y="145" width="20" height="20" rx="2" fill="#00d4ff" opacity="0.45"/>
  <rect x="855" y="145" width="20" height="20" rx="2" fill="#ff00e5" opacity="0.3"/>
  <rect x="780" y="170" width="20" height="20" rx="2" fill="#ff00e5" opacity="0.5"/>
  <rect x="805" y="170" width="20" height="20" rx="2" fill="#00d4ff" opacity="0.6"/>
  <rect x="830" y="170" width="20" height="20" rx="2" fill="#ff00e5" opacity="0.5"/>
  <rect x="855" y="170" width="20" height="20" rx="2" fill="#00d4ff" opacity="0.35"/>
  <rect x="880" y="170" width="20" height="20" rx="2" fill="#ff00e5" opacity="0.2"/>
  <!-- Fading pixels -->
  <rect x="855" y="120" width="20" height="20" rx="2" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.25"/>
  <rect x="880" y="120" width="20" height="20" rx="2" stroke="#ff00e5" stroke-width="1" fill="none" opacity="0.15"/>
  <rect x="880" y="145" width="20" height="20" rx="2" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.15"/>
  <rect x="905" y="170" width="20" height="20" rx="2" stroke="#ff00e5" stroke-width="1" fill="none" opacity="0.1"/>
</g>
<!-- Creative explosion shapes center -->
<g transform="translate(600,200)" filter="url(#glow)" class="pulse">
  <line x1="0" y1="-50" x2="0" y2="-80" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="-35" x2="56" y2="-56" stroke="#ff00e5" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="0" x2="80" y2="0" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="35" x2="56" y2="56" stroke="#ff00e5" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="50" x2="0" y2="80" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="-35" y1="35" x2="-56" y2="56" stroke="#ff00e5" stroke-width="2" opacity="0.5"/>
  <line x1="-50" y1="0" x2="-80" y2="0" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="-35" y1="-35" x2="-56" y2="-56" stroke="#ff00e5" stroke-width="2" opacity="0.5"/>
  <circle r="25" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.5"/>
</g>
<!-- Sparkle effects -->
<g filter="url(#glow)" opacity="0.7">
  <path d="M500 80 L503 90 L512 92 L503 94 L500 104 L497 94 L488 92 L497 90 Z" fill="#00d4ff"/>
  <path d="M750 300 L753 308 L760 310 L753 312 L750 320 L747 312 L740 310 L747 308 Z" fill="#ff00e5"/>
  <path d="M900 80 L902 86 L908 88 L902 90 L900 96 L898 90 L892 88 L898 86 Z" fill="#00d4ff" opacity="0.5"/>
</g>
<!-- Image frame forming -->
<rect x="760" y="100" width="180" height="120" rx="6" stroke="url(#g1)" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>