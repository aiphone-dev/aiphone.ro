<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
  @keyframes dataflow{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
  @keyframes block{0%,70%{opacity:0.3}80%{opacity:0.8}100%{opacity:0.3}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .flow{animation:dataflow 2s linear infinite}
  .block{animation:block 2.5s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- Eye with slash center-left -->
<g transform="translate(320,190)" filter="url(#glow)" opacity="0.6">
  <path d="M-70 0 Q-35 -45 0 -50 Q35 -45 70 0 Q35 45 0 50 Q-35 45 -70 0 Z" stroke="url(#g1)" stroke-width="2" fill="none"/>
  <circle r="22" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle r="10" stroke="#00d4ff" stroke-width="1" fill="#00d4ff" fill-opacity="0.1" opacity="0.6"/>
  <circle r="4" fill="#00d4ff" opacity="0.4"/>
  <!-- Slash through eye -->
  <line x1="-55" y1="50" x2="55" y2="-50" stroke="#ff00e5" stroke-width="3" opacity="0.8"/>
  <line x1="-52" y1="53" x2="58" y2="-47" stroke="#ff00e5" stroke-width="1" opacity="0.4"/>
</g>
<!-- Fingerprint outline center -->
<g transform="translate(620,185)" filter="url(#glow)" opacity="0.5" class="pulse">
  <path d="M-8 40 Q-30 30 -35 5 Q-38 -20 -25 -38 Q-10 -55 10 -55 Q30 -55 40 -35" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
  <path d="M-5 35 Q-20 25 -25 5 Q-28 -15 -18 -30 Q-5 -42 12 -42 Q28 -42 35 -25" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M0 30 Q-12 20 -15 5 Q-18 -10 -8 -22 Q5 -32 18 -28 Q28 -24 28 -10" stroke="url(#g1)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M5 25 Q-2 18 -5 5 Q-7 -5 2 -14 Q10 -20 18 -14 Q22 -10 20 0" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M8 18 Q5 12 5 5 Q5 -3 10 -6 Q16 -8 18 -2" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.4"/>
</g>
<!-- Shield right -->
<g transform="translate(920,175)" filter="url(#glow)" opacity="0.55">
  <path d="M0 -65 L55 -40 L55 15 Q55 60 0 80 Q-55 60 -55 15 L-55 -40 Z" stroke="url(#g1)" stroke-width="2" fill="none"/>
  <path d="M0 -45 L38 -28 L38 10 Q38 42 0 55 Q-38 42 -38 10 L-38 -28 Z" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Checkmark inside -->
  <path d="M-15 5 L-5 15 L20 -12" stroke="#00d4ff" stroke-width="2.5" fill="none" opacity="0.7"/>
</g>
<!-- Data streams being blocked left side -->
<g opacity="0.35">
  <line x1="50" y1="120" x2="230" y2="160" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" class="flow"/>
  <line x1="50" y1="180" x2="230" y2="185" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3 5" class="flow"/>
  <line x1="50" y1="240" x2="230" y2="210" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" class="flow"/>
  <!-- Block symbols -->
  <g class="block">
    <circle cx="240" cy="160" r="8" stroke="#ff00e5" stroke-width="1.5" fill="none"/>
    <line x1="234" y1="166" x2="246" y2="154" stroke="#ff00e5" stroke-width="1.5"/>
  </g>
  <g class="block" style="animation-delay:0.4s">
    <circle cx="240" cy="185" r="8" stroke="#ff00e5" stroke-width="1.5" fill="none"/>
    <line x1="234" y1="191" x2="246" y2="179" stroke="#ff00e5" stroke-width="1.5"/>
  </g>
  <g class="block" style="animation-delay:0.8s">
    <circle cx="240" cy="210" r="8" stroke="#ff00e5" stroke-width="1.5" fill="none"/>
    <line x1="234" y1="216" x2="246" y2="204" stroke="#ff00e5" stroke-width="1.5"/>
  </g>
</g>
<!-- Data streams being blocked right side -->
<g opacity="0.35">
  <line x1="975" y1="160" x2="1150" y2="130" stroke="#ff00e5" stroke-width="1" stroke-dasharray="4 4" class="flow"/>
  <line x1="975" y1="185" x2="1150" y2="185" stroke="#ff00e5" stroke-width="1" stroke-dasharray="3 5" class="flow"/>
  <line x1="975" y1="210" x2="1150" y2="240" stroke="#ff00e5" stroke-width="1" stroke-dasharray="4 4" class="flow"/>
</g>
<!-- Scattered lock dots -->
<g opacity="0.15" class="pulse">
  <circle cx="460" cy="100" r="2" fill="#00d4ff"/>
  <circle cx="760" cy="90" r="2" fill="#ff00e5"/>
  <circle cx="500" cy="330" r="2" fill="#00d4ff"/>
  <circle cx="700" cy="340" r="2" fill="#ff00e5"/>
</g>
<!-- Decorative background circles -->
<circle cx="150" cy="320" r="28" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.1"/>
<circle cx="1050" cy="330" r="32" stroke="#ff00e5" stroke-width="0.8" fill="none" opacity="0.1"/>
</svg>