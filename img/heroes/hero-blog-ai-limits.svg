<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.75}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .float{animation:float 3.5s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- AI Head silhouettes -->
<!-- Large head left -->
<g transform="translate(250,160)" filter="url(#glow)" opacity="0.5">
  <path d="M0 -60 Q-50 -60 -55 -10 Q-58 30 -30 50 L-30 70 L30 70 L30 50 Q58 30 55 -10 Q50 -60 0 -60 Z" stroke="#00d4ff" stroke-width="2" fill="none"/>
  <circle cx="-15" cy="-15" r="6" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="15" cy="-15" r="6" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M-10 15 Q0 25 10 15" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Circuit lines on head -->
  <line x1="-30" y1="-40" x2="-45" y2="-40" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="-40" x2="45" y2="-40" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <circle cx="-48" cy="-40" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="48" cy="-40" r="2" fill="#00d4ff" opacity="0.4"/>
</g>
<!-- Medium head center -->
<g transform="translate(600,170)" filter="url(#glow)" opacity="0.6" class="float">
  <path d="M0 -50 Q-42 -50 -46 -8 Q-48 25 -25 42 L-25 58 L25 58 L25 42 Q48 25 46 -8 Q42 -50 0 -50 Z" stroke="url(#g1)" stroke-width="2" fill="none"/>
  <circle cx="-12" cy="-12" r="5" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="12" cy="-12" r="5" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M-8 12 Q0 20 8 12" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.5"/>
  <line x1="-25" y1="-33" x2="-38" y2="-33" stroke="#ff00e5" stroke-width="1" opacity="0.3"/>
  <line x1="25" y1="-33" x2="38" y2="-33" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
</g>
<!-- Small head right -->
<g transform="translate(950,175)" filter="url(#glow)" opacity="0.45">
  <path d="M0 -40 Q-34 -40 -37 -6 Q-38 20 -20 34 L-20 46 L20 46 L20 34 Q38 20 37 -6 Q34 -40 0 -40 Z" stroke="#ff00e5" stroke-width="2" fill="none"/>
  <circle cx="-10" cy="-10" r="4" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="10" cy="-10" r="4" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M-6 10 Q0 16 6 10" stroke="#ff00e5" stroke-width="1" fill="none" opacity="0.4"/>
</g>
<!-- Bar chart (limits comparison) -->
<g transform="translate(400,340)" opacity="0.5" class="pulse">
  <rect x="0" y="-140" width="25" height="140" rx="3" stroke="#00d4ff" stroke-width="1.5" fill="#00d4ff" fill-opacity="0.15"/>
  <rect x="40" y="-180" width="25" height="180" rx="3" stroke="url(#g1)" stroke-width="1.5" fill="url(#g1)" fill-opacity="0.1"/>
  <rect x="80" y="-100" width="25" height="100" rx="3" stroke="#ff00e5" stroke-width="1.5" fill="#ff00e5" fill-opacity="0.12"/>
  <rect x="120" y="-160" width="25" height="160" rx="3" stroke="#00d4ff" stroke-width="1.5" fill="#00d4ff" fill-opacity="0.12"/>
  <rect x="160" y="-120" width="25" height="120" rx="3" stroke="#ff00e5" stroke-width="1.5" fill="#ff00e5" fill-opacity="0.1"/>
  <!-- Baseline -->
  <line x1="-10" y1="0" x2="195" y2="0" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
</g>
<!-- Gauge/meter shape -->
<g transform="translate(850,320)" opacity="0.4" filter="url(#glow)">
  <path d="M-60 0 A60 60 0 0 1 60 0" stroke="url(#g1)" stroke-width="2" fill="none"/>
  <path d="M-45 0 A45 45 0 0 1 0 -45" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.6"/>
  <line x1="0" y1="0" x2="20" y2="-35" stroke="#ff00e5" stroke-width="2" opacity="0.7"/>
  <circle r="4" fill="#ff00e5" opacity="0.6"/>
</g>
<!-- Connection dots between heads -->
<g opacity="0.2">
  <line x1="310" y1="160" x2="555" y2="170" stroke="url(#g1)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="645" y1="170" x2="910" y2="175" stroke="url(#g1)" stroke-width="1" stroke-dasharray="4 4"/>
</g>
<!-- Background decorative -->
<circle cx="150" cy="80" r="25" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.1"/>
<circle cx="1050" cy="90" r="30" stroke="#ff00e5" stroke-width="0.8" fill="none" opacity="0.1"/>
</svg>