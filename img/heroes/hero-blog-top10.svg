<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .float{animation:float 3.5s ease-in-out infinite}
  .pop{animation:pop 2.5s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- Grid of app icon squares center -->
<g transform="translate(500,130)" filter="url(#glow)" opacity="0.5">
  <rect x="0" y="0" width="40" height="40" rx="8" stroke="#00d4ff" stroke-width="1.5" fill="#00d4ff" fill-opacity="0.08"/>
  <rect x="55" y="0" width="40" height="40" rx="8" stroke="url(#g1)" stroke-width="1.5" fill="url(#g1)" fill-opacity="0.06"/>
  <rect x="110" y="0" width="40" height="40" rx="8" stroke="#ff00e5" stroke-width="1.5" fill="#ff00e5" fill-opacity="0.08"/>
  <rect x="0" y="55" width="40" height="40" rx="8" stroke="#ff00e5" stroke-width="1.5" fill="#ff00e5" fill-opacity="0.06"/>
  <rect x="55" y="55" width="40" height="40" rx="8" stroke="#00d4ff" stroke-width="1.5" fill="#00d4ff" fill-opacity="0.08"/>
  <rect x="110" y="55" width="40" height="40" rx="8" stroke="url(#g1)" stroke-width="1.5" fill="url(#g1)" fill-opacity="0.06"/>
  <rect x="0" y="110" width="40" height="40" rx="8" stroke="url(#g1)" stroke-width="1.5" fill="url(#g1)" fill-opacity="0.06"/>
  <rect x="55" y="110" width="40" height="40" rx="8" stroke="#ff00e5" stroke-width="1.5" fill="#ff00e5" fill-opacity="0.06"/>
  <rect x="110" y="110" width="40" height="40" rx="8" stroke="#00d4ff" stroke-width="1.5" fill="#00d4ff" fill-opacity="0.08"/>
  <!-- Small icons inside some squares -->
  <circle cx="20" cy="20" r="8" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M68 12 L82 12 L82 28 L68 28 Z" stroke="url(#g1)" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M125 15 L135 15 L135 25 L125 25" stroke="#ff00e5" stroke-width="0.8" fill="none" opacity="0.4"/>
</g>
<!-- Number 10 large left -->
<g transform="translate(230,200)" filter="url(#glow)" class="pop" opacity="0.55">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="120" font-weight="bold" stroke="url(#g1)" stroke-width="2.5" fill="none" text-anchor="middle">10</text>
</g>
<!-- Trophy/medal right -->
<g transform="translate(950,170)" filter="url(#glow)" opacity="0.5" class="float">
  <!-- Trophy cup -->
  <path d="M-25 -50 L25 -50 L20 0 Q18 25 0 30 Q-18 25 -20 0 Z" stroke="url(#g1)" stroke-width="2" fill="none"/>
  <line x1="0" y1="30" x2="0" y2="50" stroke="url(#g1)" stroke-width="2"/>
  <rect x="-18" y="50" width="36" height="8" rx="3" stroke="url(#g1)" stroke-width="1.5" fill="none"/>
  <!-- Handles -->
  <path d="M-25 -40 Q-45 -35 -45 -15 Q-45 5 -20 5" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M25 -40 Q45 -35 45 -15 Q45 5 20 5" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Star on trophy -->
  <path d="M0 -35 L4 -25 L14 -25 L6 -19 L9 -9 L0 -15 L-9 -9 L-6 -19 L-14 -25 L-4 -25 Z" stroke="#ff00e5" stroke-width="1" fill="#ff00e5" fill-opacity="0.15" opacity="0.6"/>
</g>
<!-- Download arrows scattered -->
<g opacity="0.3" class="pulse">
  <g transform="translate(130,140)">
    <line x1="0" y1="-15" x2="0" y2="10" stroke="#00d4ff" stroke-width="1.5"/>
    <path d="M-6 4 L0 12 L6 4" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
    <line x1="-8" y1="15" x2="8" y2="15" stroke="#00d4ff" stroke-width="1"/>
  </g>
  <g transform="translate(1080,250)">
    <line x1="0" y1="-15" x2="0" y2="10" stroke="#ff00e5" stroke-width="1.5"/>
    <path d="M-6 4 L0 12 L6 4" stroke="#ff00e5" stroke-width="1.5" fill="none"/>
    <line x1="-8" y1="15" x2="8" y2="15" stroke="#ff00e5" stroke-width="1"/>
  </g>
  <g transform="translate(400,330)">
    <line x1="0" y1="-12" x2="0" y2="8" stroke="url(#g1)" stroke-width="1.5"/>
    <path d="M-5 3 L0 10 L5 3" stroke="url(#g1)" stroke-width="1.5" fill="none"/>
    <line x1="-7" y1="12" x2="7" y2="12" stroke="url(#g1)" stroke-width="1"/>
  </g>
</g>
<!-- Ranking bars background -->
<g transform="translate(750,310)" opacity="0.25">
  <rect x="0" y="-30" width="20" height="30" rx="2" stroke="#ff00e5" stroke-width="1" fill="#ff00e5" fill-opacity="0.1"/>
  <rect x="25" y="-55" width="20" height="55" rx="2" stroke="url(#g1)" stroke-width="1" fill="url(#g1)" fill-opacity="0.08"/>
  <rect x="50" y="-42" width="20" height="42" rx="2" stroke="#00d4ff" stroke-width="1" fill="#00d4ff" fill-opacity="0.1"/>
</g>
<!-- Decorative background circles -->
<circle cx="100" cy="320" r="25" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.1"/>
<circle cx="1100" cy="100" r="30" stroke="#ff00e5" stroke-width="0.8" fill="none" opacity="0.1"/>
</svg>