<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .spiral{animation:spin 20s linear infinite}
  .float{animation:float 3.5s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- Galaxy spiral center-left -->
<g transform="translate(350,200)" filter="url(#glow)" opacity="0.5">
  <g class="spiral" transform-origin="0 0">
    <path d="M0 0 Q30 -10 50 -40 Q70 -75 40 -95 Q5 -110 -30 -80 Q-65 -45 -45 0 Q-25 50 20 60 Q70 70 100 30 Q125 -15 95 -60" stroke="url(#g1)" stroke-width="2" fill="none"/>
    <path d="M0 0 Q-25 15 -40 45 Q-55 80 -25 95 Q10 105 40 70 Q65 35 40 -5 Q15 -50 -30 -55 Q-80 -55 -95 -10" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
  <circle r="5" fill="#00d4ff" opacity="0.6"/>
  <circle r="2" fill="#ff00e5" opacity="0.8"/>
</g>
<!-- Phone outline center -->
<g transform="translate(650,190)" filter="url(#glow)" class="float" opacity="0.6">
  <rect x="-35" y="-80" width="70" height="140" rx="10" stroke="url(#g1)" stroke-width="2" fill="none"/>
  <rect x="-25" y="-65" width="50" height="105" rx="3" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.3"/>
  <circle cy="55" r="4" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- AI sparkle on screen -->
  <path d="M0 -30 L4 -20 L14 -20 L6 -14 L9 -4 L0 -10 L-9 -4 L-6 -14 L-14 -20 L-4 -20 Z" stroke="#ff00e5" stroke-width="1" fill="#ff00e5" fill-opacity="0.15" opacity="0.7"/>
</g>
<!-- Translate icon left -->
<g transform="translate(170,160)" opacity="0.4" class="pulse">
  <text x="0" y="0" font-family="serif" font-size="32" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6">A</text>
  <path d="M35 -5 L50 -5" stroke="#00d4ff" stroke-width="1.5"/>
  <path d="M45 -10 L50 -5 L45 0" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
  <text x="55" y="2" font-family="serif" font-size="28" stroke="#ff00e5" stroke-width="1" fill="none" opacity="0.6">B</text>
</g>
<!-- Photo/camera icon right -->
<g transform="translate(980,170)" opacity="0.4" filter="url(#glow)">
  <rect x="-30" y="-20" width="60" height="45" rx="6" stroke="#ff00e5" stroke-width="1.5" fill="none"/>
  <circle cy="3" r="14" stroke="#ff00e5" stroke-width="1.5" fill="none"/>
  <circle cy="3" r="6" stroke="#ff00e5" stroke-width="1" fill="#ff00e5" fill-opacity="0.1"/>
  <rect x="-10" y="-25" width="20" height="8" rx="3" stroke="#ff00e5" stroke-width="1" fill="none" opacity="0.5"/>
</g>
<!-- Samsung-style rounded shapes scattered -->
<g opacity="0.15">
  <rect x="100" y="280" width="50" height="50" rx="15" stroke="#00d4ff" stroke-width="1.2" fill="none"/>
  <rect x="820" y="70" width="40" height="40" rx="12" stroke="#ff00e5" stroke-width="1" fill="none"/>
  <rect x="500" y="320" width="35" height="35" rx="10" stroke="url(#g1)" stroke-width="1" fill="none"/>
  <rect x="1070" y="290" width="45" height="45" rx="14" stroke="#ff00e5" stroke-width="1" fill="none"/>
</g>
<!-- Scattered galaxy dots -->
<g opacity="0.25" class="pulse">
  <circle cx="280" cy="90" r="2" fill="#00d4ff"/>
  <circle cx="450" cy="340" r="1.5" fill="#00d4ff"/>
  <circle cx="560" cy="70" r="2" fill="#ff00e5"/>
  <circle cx="750" cy="340" r="1.5" fill="#ff00e5"/>
  <circle cx="880" cy="310" r="2" fill="#00d4ff"/>
  <circle cx="1100" cy="120" r="1.5" fill="#ff00e5"/>
</g>
<!-- Decorative background circles -->
<circle cx="200" cy="350" r="25" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.1"/>
<circle cx="1000" cy="350" r="30" stroke="#ff00e5" stroke-width="0.8" fill="none" opacity="0.1"/>
</svg>