<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <radialGradient id="rg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff00e5" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .sparkle{animation:pulse 2s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<circle cx="600" cy="200" r="180" fill="url(#rg)"/>
<!-- Camera lens -->
<g transform="translate(600,200)" filter="url(#glow)">
  <circle r="80" stroke="url(#g1)" stroke-width="2.5" fill="none" opacity="0.6"/>
  <circle r="60" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle r="40" stroke="#ff00e5" stroke-width="1" fill="none" opacity="0.3"/>
  <circle r="20" fill="#00d4ff" opacity="0.15"/>
  <!-- Aperture blades hint -->
  <path d="M0 -60 L15 -40 L-15 -40 Z" fill="#00d4ff" opacity="0.2"/>
  <path d="M52 30 L55 5 L35 25 Z" fill="#00d4ff" opacity="0.2"/>
  <path d="M-52 30 L-55 5 L-35 25 Z" fill="#00d4ff" opacity="0.2"/>
</g>
<!-- Image frame left -->
<g opacity="0.4">
  <rect x="150" y="100" width="200" height="150" rx="8" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
  <line x1="150" y1="200" x2="220" y2="160" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="160" x2="280" y2="180" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="180" x2="350" y2="130" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="135" r="12" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.4"/>
</g>
<!-- Image frame right (enhanced) -->
<g opacity="0.5">
  <rect x="850" y="110" width="200" height="150" rx="8" stroke="#ff00e5" stroke-width="1.5" fill="none"/>
  <line x1="850" y1="210" x2="920" y2="160" stroke="#ff00e5" stroke-width="1" opacity="0.6"/>
  <line x1="920" y1="160" x2="980" y2="185" stroke="#ff00e5" stroke-width="1" opacity="0.6"/>
  <line x1="980" y1="185" x2="1050" y2="140" stroke="#ff00e5" stroke-width="1" opacity="0.6"/>
  <circle cx="900" cy="140" r="12" fill="#ff00e5" opacity="0.2"/>
</g>
<!-- Sparkle effects -->
<g class="sparkle" filter="url(#glow)">
  <path d="M480 100 L483 108 L490 110 L483 112 L480 120 L477 112 L470 110 L477 108 Z" fill="#00d4ff" opacity="0.7"/>
  <path d="M750 90 L752 96 L758 98 L752 100 L750 106 L748 100 L742 98 L748 96 Z" fill="#ff00e5" opacity="0.7"/>
  <path d="M520 300 L523 308 L530 310 L523 312 L520 320 L517 312 L510 310 L517 308 Z" fill="#00d4ff" opacity="0.6"/>
  <path d="M700 310 L702 316 L708 318 L702 320 L700 326 L698 320 L692 318 L698 316 Z" fill="#ff00e5" opacity="0.6"/>
</g>
<!-- Enhancement arrow -->
<g opacity="0.3" class="pulse">
  <path d="M400 200 L470 200" stroke="url(#g1)" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="470,195 480,200 470,205" fill="url(#g1)"/>
  <path d="M720 200 L790 200" stroke="url(#g1)" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="790,195 800,200 790,205" fill="url(#g1)"/>
</g>
<!-- Gradient overlay bar -->
<rect x="150" y="300" width="900" height="4" rx="2" fill="url(#g1)" opacity="0.15"/>
</svg>