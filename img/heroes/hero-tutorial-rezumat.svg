<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .float{animation:float 3.5s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- Long document left -->
<g opacity="0.5" filter="url(#glow)">
  <rect x="150" y="50" width="160" height="300" rx="8" stroke="#00d4ff" stroke-width="2" fill="none"/>
  <!-- Many text lines -->
  <rect x="170" y="75" width="110" height="2.5" rx="1" fill="#00d4ff" opacity="0.5"/>
  <rect x="170" y="88" width="100" height="2.5" rx="1" fill="#00d4ff" opacity="0.45"/>
  <rect x="170" y="101" width="120" height="2.5" rx="1" fill="#00d4ff" opacity="0.4"/>
  <rect x="170" y="114" width="90" height="2.5" rx="1" fill="#00d4ff" opacity="0.4"/>
  <rect x="170" y="127" width="115" height="2.5" rx="1" fill="#00d4ff" opacity="0.35"/>
  <rect x="170" y="140" width="105" height="2.5" rx="1" fill="#00d4ff" opacity="0.35"/>
  <rect x="170" y="153" width="95" height="2.5" rx="1" fill="#00d4ff" opacity="0.3"/>
  <rect x="170" y="166" width="120" height="2.5" rx="1" fill="#00d4ff" opacity="0.3"/>
  <rect x="170" y="179" width="80" height="2.5" rx="1" fill="#00d4ff" opacity="0.25"/>
  <rect x="170" y="192" width="110" height="2.5" rx="1" fill="#00d4ff" opacity="0.25"/>
  <rect x="170" y="205" width="100" height="2.5" rx="1" fill="#00d4ff" opacity="0.2"/>
  <rect x="170" y="218" width="115" height="2.5" rx="1" fill="#00d4ff" opacity="0.2"/>
  <rect x="170" y="231" width="90" height="2.5" rx="1" fill="#00d4ff" opacity="0.18"/>
  <rect x="170" y="244" width="105" height="2.5" rx="1" fill="#00d4ff" opacity="0.18"/>
  <rect x="170" y="257" width="120" height="2.5" rx="1" fill="#00d4ff" opacity="0.15"/>
  <rect x="170" y="270" width="85" height="2.5" rx="1" fill="#00d4ff" opacity="0.15"/>
  <rect x="170" y="283" width="100" height="2.5" rx="1" fill="#00d4ff" opacity="0.12"/>
  <rect x="170" y="296" width="95" height="2.5" rx="1" fill="#00d4ff" opacity="0.12"/>
  <rect x="170" y="309" width="110" height="2.5" rx="1" fill="#00d4ff" opacity="0.1"/>
  <rect x="170" y="322" width="75" height="2.5" rx="1" fill="#00d4ff" opacity="0.1"/>
</g>
<!-- Funnel shape center -->
<g class="pulse" filter="url(#glow)">
  <path d="M400 80 L600 170 L600 230 L400 320" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M400 80 L400 320" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" fill="none" opacity="0.2"/>
  <!-- Funnel particles -->
  <circle cx="450" cy="120" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="470" cy="160" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="500" cy="140" r="1.5" fill="#ff00e5" opacity="0.4"/>
  <circle cx="520" cy="200" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="490" cy="240" r="1.5" fill="#ff00e5" opacity="0.4"/>
  <circle cx="460" cy="280" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="550" cy="190" r="1.5" fill="#ff00e5" opacity="0.5"/>
</g>
<!-- Arrow from funnel to result -->
<path d="M610 200 L750 200" stroke="url(#g1)" stroke-width="2" stroke-dasharray="6 4" fill="none" opacity="0.4"/>
<polygon points="750,195 762,200 750,205" fill="url(#g1)" opacity="0.5"/>
<!-- Compact result (bullet points) right -->
<g class="float" filter="url(#glow)">
  <rect x="800" y="120" width="200" height="160" rx="10" stroke="#ff00e5" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Bullet points -->
  <circle cx="825" cy="155" r="4" fill="#ff00e5" opacity="0.6"/>
  <rect x="840" y="153" width="130" height="3" rx="1.5" fill="#ff00e5" opacity="0.5"/>
  <circle cx="825" cy="185" r="4" fill="#ff00e5" opacity="0.6"/>
  <rect x="840" y="183" width="110" height="3" rx="1.5" fill="#ff00e5" opacity="0.5"/>
  <circle cx="825" cy="215" r="4" fill="#ff00e5" opacity="0.6"/>
  <rect x="840" y="213" width="140" height="3" rx="1.5" fill="#ff00e5" opacity="0.5"/>
  <circle cx="825" cy="245" r="4" fill="#ff00e5" opacity="0.6"/>
  <rect x="840" y="243" width="100" height="3" rx="1.5" fill="#ff00e5" opacity="0.5"/>
</g>
<!-- Stacked pages behind document -->
<rect x="160" y="55" width="160" height="300" rx="8" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.12"/>
<rect x="170" y="60" width="160" height="300" rx="8" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.08"/>
</svg>