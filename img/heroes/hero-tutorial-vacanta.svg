<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:0.8}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .float{animation:float 4s ease-in-out infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- Background grid dots -->
<g opacity="0.1">
  <circle cx="100" cy="80" r="2" fill="#00d4ff"/><circle cx="200" cy="80" r="2" fill="#00d4ff"/>
  <circle cx="300" cy="80" r="2" fill="#00d4ff"/><circle cx="400" cy="80" r="2" fill="#00d4ff"/>
  <circle cx="100" cy="160" r="2" fill="#00d4ff"/><circle cx="200" cy="160" r="2" fill="#00d4ff"/>
  <circle cx="300" cy="160" r="2" fill="#00d4ff"/><circle cx="400" cy="160" r="2" fill="#00d4ff"/>
  <circle cx="800" cy="120" r="2" fill="#ff00e5"/><circle cx="900" cy="120" r="2" fill="#ff00e5"/>
  <circle cx="1000" cy="120" r="2" fill="#ff00e5"/><circle cx="1100" cy="120" r="2" fill="#ff00e5"/>
  <circle cx="800" cy="200" r="2" fill="#ff00e5"/><circle cx="900" cy="200" r="2" fill="#ff00e5"/>
  <circle cx="1000" cy="200" r="2" fill="#ff00e5"/><circle cx="1100" cy="200" r="2" fill="#ff00e5"/>
</g>
<!-- Dotted route line -->
<path d="M150 300 Q350 100 600 200 Q850 300 1050 120" stroke="url(#g1)" stroke-width="2" stroke-dasharray="8 6" fill="none" opacity="0.4" class="pulse"/>
<!-- Map pins -->
<g opacity="0.6" filter="url(#glow)" class="float">
  <circle cx="150" cy="300" r="8" fill="#00d4ff"/><path d="M150 280 L150 260 Q150 250 150 250" stroke="#00d4ff" stroke-width="2" fill="none"/>
  <circle cx="150" cy="248" r="10" stroke="#00d4ff" stroke-width="2" fill="none"/>
</g>
<g opacity="0.6" filter="url(#glow)">
  <circle cx="1050" cy="120" r="8" fill="#ff00e5"/><path d="M1050 100 L1050 80 Q1050 70 1050 70" stroke="#ff00e5" stroke-width="2" fill="none"/>
  <circle cx="1050" cy="68" r="10" stroke="#ff00e5" stroke-width="2" fill="none"/>
</g>
<!-- Airplane silhouette -->
<g transform="translate(700,140) rotate(-20)" opacity="0.7" filter="url(#glow)" class="float">
  <path d="M0 0 L-30 -8 L-50 -25 L-45 -5 L-80 -10 L-75 0 L-80 10 L-45 5 L-50 25 L-30 8 Z" fill="url(#g1)" opacity="0.6"/>
</g>
<!-- Center phone outline -->
<g transform="translate(540,120)" opacity="0.5">
  <rect x="0" y="0" width="120" height="200" rx="15" stroke="url(#g1)" stroke-width="2" fill="none"/>
  <rect x="10" y="20" width="100" height="150" rx="4" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="60" cy="190" r="5" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.4"/>
</g>
<!-- Extra map pin mid-route -->
<g opacity="0.5" filter="url(#glow)">
  <circle cx="600" cy="200" r="6" fill="#00d4ff"/>
  <circle cx="600" cy="185" r="8" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
</g>
<!-- Decorative circles -->
<circle cx="300" cy="350" r="40" stroke="#ff00e5" stroke-width="1" fill="none" opacity="0.15"/>
<circle cx="950" cy="320" r="50" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.12"/>
<circle cx="200" cy="60" r="25" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.1"/>
</svg>