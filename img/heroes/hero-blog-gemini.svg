<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff00e5"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
  @keyframes sparkle{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.3);opacity:0.9}}
  @keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  .pulse{animation:pulse 3s ease-in-out infinite}
  .sparkle{animation:sparkle 2.5s ease-in-out infinite}
  .spin{animation:rotate 12s linear infinite}
</style>
<rect width="1200" height="400" fill="#0a0a0f"/>
<!-- Large sparkle/star shape center -->
<g transform="translate(600,190)" filter="url(#glow)" class="sparkle">
  <path d="M0 -70 L12 -18 L60 -22 L22 12 L35 65 L0 35 L-35 65 L-22 12 L-60 -22 L-12 -18 Z" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M0 -45 L8 -12 L40 -14 L14 8 L22 42 L0 22 L-22 42 L-14 8 L-40 -14 L-8 -12 Z" stroke="#00d4ff" stroke-width="1" fill="#00d4ff" fill-opacity="0.05" opacity="0.4"/>
</g>
<!-- G letter outline -->
<g transform="translate(280,180)" filter="url(#glow)" opacity="0.5">
  <path d="M50 -60 Q-10 -65 -35 -30 Q-55 0 -35 35 Q-10 65 30 60 Q55 55 55 30 L25 30 L25 5 L60 5 L60 40 Q60 75 25 80 Q-25 85 -55 50 Q-80 10 -55 -40 Q-25 -85 30 -80 Q60 -78 70 -55" stroke="#00d4ff" stroke-width="2.5" fill="none"/>
</g>
<!-- Android robot silhouette -->
<g transform="translate(920,170)" filter="url(#glow)" opacity="0.45">
  <path d="M-30 -10 Q-30 -40 0 -50 Q30 -40 30 -10 Z" stroke="#ff00e5" stroke-width="2" fill="none"/>
  <circle cx="-12" cy="-25" r="3" fill="#ff00e5" opacity="0.6"/>
  <circle cx="12" cy="-25" r="3" fill="#ff00e5" opacity="0.6"/>
  <line x1="-18" y1="-55" x2="-28" y2="-70" stroke="#ff00e5" stroke-width="1.5" opacity="0.5"/>
  <line x1="18" y1="-55" x2="28" y2="-70" stroke="#ff00e5" stroke-width="1.5" opacity="0.5"/>
  <rect x="-30" y="-8" width="60" height="60" rx="8" stroke="#ff00e5" stroke-width="2" fill="none"/>
  <rect x="-40" y="2" width="8" height="35" rx="4" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  <rect x="32" y="2" width="8" height="35" rx="4" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  <rect x="-18" y="54" width="12" height="25" rx="4" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
  <rect x="6" y="54" width="12" height="25" rx="4" stroke="#ff00e5" stroke-width="1.5" fill="none" opacity="0.5"/>
</g>
<!-- Neural connection network -->
<g opacity="0.3" class="pulse">
  <circle cx="420" cy="120" r="4" fill="#00d4ff"/>
  <circle cx="500" cy="80" r="3" fill="#00d4ff"/>
  <circle cx="700" cy="90" r="3.5" fill="#ff00e5"/>
  <circle cx="780" cy="130" r="3" fill="#ff00e5"/>
  <circle cx="460" cy="280" r="3" fill="#00d4ff"/>
  <circle cx="740" cy="290" r="3.5" fill="#ff00e5"/>
  <line x1="420" y1="120" x2="500" y2="80" stroke="#00d4ff" stroke-width="0.8"/>
  <line x1="500" y1="80" x2="600" y2="120" stroke="url(#g1)" stroke-width="0.8"/>
  <line x1="600" y1="120" x2="700" y2="90" stroke="url(#g1)" stroke-width="0.8"/>
  <line x1="700" y1="90" x2="780" y2="130" stroke="#ff00e5" stroke-width="0.8"/>
  <line x1="460" y1="280" x2="600" y2="260" stroke="#00d4ff" stroke-width="0.8"/>
  <line x1="600" y1="260" x2="740" y2="290" stroke="#ff00e5" stroke-width="0.8"/>
</g>
<!-- Smaller sparkles scattered -->
<g class="sparkle" opacity="0.4">
  <path d="M160 100 L163 108 L172 108 L165 113 L168 122 L160 117 L152 122 L155 113 L148 108 L157 108 Z" stroke="#00d4ff" stroke-width="1" fill="none"/>
</g>
<g class="sparkle" style="animation-delay:0.8s" opacity="0.35">
  <path d="M1040 140 L1043 148 L1052 148 L1045 153 L1048 162 L1040 157 L1032 162 L1035 153 L1028 148 L1037 148 Z" stroke="#ff00e5" stroke-width="1" fill="none"/>
</g>
<g class="sparkle" style="animation-delay:1.5s" opacity="0.3">
  <path d="M480 330 L482 336 L489 336 L484 340 L486 347 L480 343 L474 347 L476 340 L471 336 L478 336 Z" stroke="url(#g1)" stroke-width="1" fill="none"/>
</g>
<!-- Decorative background circles -->
<circle cx="150" cy="320" r="30" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.1"/>
<circle cx="1050" cy="310" r="25" stroke="#ff00e5" stroke-width="0.8" fill="none" opacity="0.1"/>
</svg>