<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#ff00e5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#ff00e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Phone body - rounded rectangle -->
  <rect x="12" y="4" width="40" height="56" rx="8" ry="8" fill="#0a0a1a" stroke="url(#grad)" stroke-width="2.5"/>

  <!-- Screen area -->
  <rect x="16" y="10" width="32" height="40" rx="3" ry="3" fill="#0d0d20" opacity="0.8"/>

  <!-- Neural network dots -->
  <circle cx="22" cy="16" r="1.5" fill="#00d4ff" opacity="0.6"/>
  <circle cx="42" cy="16" r="1.5" fill="#ff00e5" opacity="0.6"/>
  <circle cx="22" cy="44" r="1.5" fill="#ff00e5" opacity="0.6"/>
  <circle cx="42" cy="44" r="1.5" fill="#00d4ff" opacity="0.6"/>
  <circle cx="32" cy="18" r="1.2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="26" cy="42" r="1.2" fill="#ff00e5" opacity="0.4"/>
  <circle cx="38" cy="42" r="1.2" fill="#00d4ff" opacity="0.4"/>

  <!-- Neural connection lines -->
  <line x1="22" y1="16" x2="32" y2="18" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="42" y1="16" x2="32" y2="18" stroke="#ff00e5" stroke-width="0.5" opacity="0.3"/>
  <line x1="22" y1="44" x2="26" y2="42" stroke="#ff00e5" stroke-width="0.5" opacity="0.3"/>
  <line x1="42" y1="44" x2="38" y2="42" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="32" y1="18" x2="26" y2="42" stroke="url(#grad)" stroke-width="0.4" opacity="0.2"/>
  <line x1="32" y1="18" x2="38" y2="42" stroke="url(#grad)" stroke-width="0.4" opacity="0.2"/>

  <!-- AI text centered -->
  <text x="32" y="35" text-anchor="middle" font-family="'Arial Black', 'Helvetica', sans-serif" font-weight="900" font-size="16" fill="url(#textGrad)" filter="url(#glow)">AI</text>

  <!-- Bottom bar (phone chin detail) -->
  <rect x="27" y="53" width="10" height="2" rx="1" fill="url(#grad)" opacity="0.5"/>
</svg>
